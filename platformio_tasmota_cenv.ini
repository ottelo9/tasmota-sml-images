[tasmota]
; Reset global build / unbuild compile time flags for ALL Tasmota / Tasmota32 [env]
; since custom env are designed to enable options individual
build_unflags               =
build_flags                 =


; Custom Tasmota Firmware Builds für ottelo.jimdofree.com zum Auslesen von Stromzählern (SML)
;
; Pro Plattform existieren zwei Varianten:
;   <plattform>_ottelo_tas  → Tasmota-Scripter + Google Charts
;   <plattform>_ottelo_tc   → TinyC VM + Browser-IDE (kein Scripter)
;
; Ausnahmen: ESP8266 1M (alle drei) → nur _tas (kein _tc).
;
; Alle Images bauen (Bash + jq):
;   pio run $(pio project config --json-output | jq -r '.[] | .[0] | select(test("_ottelo_(tc|tas)$")) | sub("env:"; "-e ")')
;
; PowerShell:
;   $envs = pio project config --json-output | jq -r '.[][0] | select(test(\"_ottelo_(tc|tas)$\")) | sub(\"env:\"; \"-e \")'
;   pio run $envs.Split(\"`n\")

[env:tasmota_ottelo_base]
build_flags             =   ${env:tasmota32_base.build_flags} ;platformio_tasmota_env32.ini
                            ;-DFIRMWARE_TASMOTA32 <- FIRMWARE_TASMOTA32 entfernt
                            -DOTA_URL='"KEIN OTA UPGRADE VIA WEBSERVER!"'
extra_scripts           =   ${env:tasmota32_base.extra_scripts}
                            pre:ccache_wrapper.py ;Kompilieren mit ccache beschleunigen
lib_extra_dirs          =   lib/libesp32, lib/lib_basic, lib/lib_div, lib/lib_ssl, lib/libesp32_div ;nur diese werden für mein Build benötigt (libesp32_div nötig für matter_c)
lib_ignore              =   ; Folgende Libs werden für mein Build nicht benötigt (faster compile)
                            ;>lib/default
                            ;>lib/lib_audio
                            ESP8266Audio
                            ESP8266SAM
                            mp3_shine_esp32

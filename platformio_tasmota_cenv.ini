                            ;>lib/lib_div
                            A4988_Stepper
                            Adafruit Fingerprint Sensor Library
                            AMS Parser
                            C2Programmer
                            DS2480 Library
                            ;ESPFtpServer
                            ;ESP KNX IP Library ;notwendig für ESP8266 1M Flash USE_EEPROM
                            LibTeleinfo
                            NewPing
                            OpenTherm Library
                            Process_control
                            MFRC522
                            stm32_flash
                            ;>lib/lib_i2c
                            Adafruit CCS811 Library

; =============================================================================
; ESP32
; =============================================================================

; --- Generic ESP32 -----------------------------------------------------------
[env:tasmota32_ottelo_tas]
extends                 = env:tasmota32_base
extra_scripts           = ${env:tasmota_ottelo_base.extra_scripts}
build_flags             = ${env:tasmota_ottelo_base.build_flags}
                          -DTASMOTA32_OTTELO
                          -DOTTELO_VARIANT_TAS
                          -DCODE_IMAGE_STR='"ESP32 TAS ottelo.jimdofree.com"'
lib_extra_dirs          = ${env:tasmota_ottelo_base.lib_extra_dirs}
lib_ignore              = ${env:tasmota_ottelo_base.lib_ignore}

[env:tasmota32_ottelo_tc]
extends                 = env:tasmota32_base
extra_scripts           = ${env:tasmota_ottelo_base.extra_scripts}
board_build.partitions  = partitions/esp32_partition_app1856k_fs1344k.csv ;TinyC braucht mehr FS (IDE ~150KB + Bytecode/Source/persist), App-Image ist kleiner
build_flags             = ${env:tasmota_ottelo_base.build_flags}
                          -DTASMOTA32_OTTELO
                          -DOTTELO_VARIANT_TC
                          -DCODE_IMAGE_STR='"ESP32 TC ottelo.jimdofree.com"'
lib_extra_dirs          = ${env:tasmota_ottelo_base.lib_extra_dirs}
lib_ignore              = ${env:tasmota_ottelo_base.lib_ignore}


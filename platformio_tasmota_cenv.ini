; =============================================================================
; ESP8266
; =============================================================================
; Achtung: ESP8266-Envs dürfen NICHT von tasmota_ottelo_base.extra_scripts erben,
; weil das wiederum von tasmota32_base.extra_scripts erbt → enthält post_esp32.py,
; das nach framework-arduinoespressif32 sucht und mit KeyError abbricht.
; Stattdessen unten die ESP8266-eigene Helper-Section nutzen.

[ottelo_esp8266]
extra_scripts           = ${env:tasmota.extra_scripts}
                          pre:ccache_wrapper.py ;Kompilieren mit ccache beschleunigen

; --- 1M Flash (kein TinyC: kein UFILESYS verfügbar) -------------------------
[env:tasmota1m_ottelo_tas]
extends                 = env:tasmota
extra_scripts           = ${ottelo_esp8266.extra_scripts}
build_flags             = ${env.build_flags}
                          -DTASMOTA1M_OTTELO
                          -DOTTELO_VARIANT_TAS
                          -DOTA_URL='"KEIN OTA UPGRADE VIA WEBSERVER!"'
                          -DCODE_IMAGE_STR='"ESP8266-1M TAS ottelo.jimdofree.com"'
build_unflags           = ${env.build_unflags}
lib_ignore              = ${env:tasmota_ottelo_base.lib_ignore}

[env:tasmota1m_energy_ottelo_tas]
extends                 = env:tasmota
extra_scripts           = ${ottelo_esp8266.extra_scripts}
build_flags             = ${env.build_flags}
                          -DTASMOTA1M_ENERGY_OTTELO
                          -DOTTELO_VARIANT_TAS
                          -DOTA_URL='"KEIN OTA UPGRADE VIA WEBSERVER!"'
                          -DCODE_IMAGE_STR='"ESP8266-1M En TAS ottelo.jimdofree.com"'
build_unflags           = ${env.build_unflags}
lib_ignore              = ${env:tasmota_ottelo_base.lib_ignore}

[env:tasmota1m_shelly_ottelo_tas]
extends                 = env:tasmota
extra_scripts           = ${ottelo_esp8266.extra_scripts}
build_flags             = ${env.build_flags}
                          -DTASMOTA1M_SHELLY_OTTELO
                          -DOTTELO_VARIANT_TAS
                          -DOTA_URL='"KEIN OTA UPGRADE VIA WEBSERVER!"'
                          -DCODE_IMAGE_STR='"ESP8266-1M Sh TAS ottelo.jimdofree.com"'
build_unflags           = ${env.build_unflags}
lib_ignore              = ${env:tasmota_ottelo_base.lib_ignore}

; --- 4M+ Flash --------------------------------------------------------------
; ESP8266 4M: nur _tas. Kein _tc — der BinPlugin-Loader (USE_BINPLUGINS, von TinyC
; mitgezogen) referenziert in seiner Jump-Table I2C-Funktionen (I2cWrite16/Read16/…),
; die ESP8266-4M aber nicht hat (USE_I2C ist im 4M-Build undef'd) -> Compile-Fehler in
; xdrv_123_plugins.ino. TinyC auf ESP8266 4M lohnt sich wegen RAM-Enge ohnehin kaum.
[env:tasmota4m_ottelo_tas]
extends                 = env:tasmota-4M
extra_scripts           = ${ottelo_esp8266.extra_scripts}
build_flags             = ${env.build_flags}
                          -DTASMOTA4M_OTTELO
                          -DOTTELO_VARIANT_TAS
                          -DOTA_URL='"KEIN OTA UPGRADE VIA WEBSERVER!"'
                          -DCODE_IMAGE_STR='"ESP8266-4M+ TAS ottelo.jimdofree.com"'
build_unflags           = ${env.build_unflags}
lib_ignore              = ${env:tasmota_ottelo_base.lib_ignore}
